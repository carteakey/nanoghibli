models:
  stylizer:
    name: "gemini-3.1-flash-image-preview"
    temperature: 0.7
    top_p: 0.95
    top_k: 40
  animator:
    name: "veo-3.1-fast-generate-preview"
    duration_seconds: "4"
    person_generation: "allow_adult"

processing:
  fps: 12.0
  motion_threshold: 20.0
  scene_threshold: 35.0
  max_duration: null
  max_workers: 4
  output_format: "mp4"
  skip_black_frames: false
  use_veo: false
  # Gemini Batch API for stylization (50% cost, async, 24h SLO).
  # CLI --batch overrides this. Veo is NOT supported by batch and stays sync.
  batch_enabled: false
  batch_poll_interval: 30       # seconds between client.batches.get polls
  batch_max_wait_hours: 24.0    # hard stop on how long to wait
